name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Dangerous paths that must never be deployed to production. Kept in one place
# so the "deploy exclusions" job and the humans reading this file agree on
# what "dangerous" means. Must stay in sync with deploy/exclude-from-deploy.txt
# and docs/legacy-critical-audit/security-findings.md.
env:
  DANGEROUS_PATTERNS: |
    MODERNIS_BACKUP/
    kmsaadmin/db.php
    kmsaadmin/*.sql
    *.sql
    test.php
    reverse.php

jobs:
  php-syntax-check:
    name: PHP syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: Lint all PHP files
        run: |
          set -euo pipefail
          status=0
          # .git is the only hard exclusion here — every tracked PHP file,
          # including MODERNIS_BACKUP/, must at least be syntactically valid,
          # even though MODERNIS_BACKUP is excluded from production deploys.
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /tmp/lint-output 2>&1; then
              echo "::error file=$file::PHP syntax error"
              cat /tmp/lint-output
              status=1
            fi
          done < <(find . -path ./.git -prune -o -type f -name '*.php' -print0)
          exit $status

  deploy-exclusions-check:
    name: Deployment exclusion guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify exclusion file exists
        run: |
          set -euo pipefail
          if [ ! -f deploy/exclude-from-deploy.txt ]; then
            echo "::error::deploy/exclude-from-deploy.txt is missing. This file is the safety layer that keeps dangerous legacy files (SQL dumps, MODERNIS_BACKUP/, kmsaadmin/db.php, debug scripts) out of production deploys. See docs/legacy-critical-audit/security-findings.md."
            exit 1
          fi

      - name: Verify dangerous patterns are listed in the exclusion file
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            if ! grep -qF -- "$pattern" deploy/exclude-from-deploy.txt; then
              echo "::error::Required exclusion pattern '$pattern' is missing from deploy/exclude-from-deploy.txt"
              missing=1
            fi
          done <<< "$DANGEROUS_PATTERNS"
          exit $missing

      - name: Warn if dangerous files currently exist in the repo
        run: |
          set -euo pipefail
          echo "The following known-dangerous files/folders exist in this checkout."
          echo "They are excluded from production deploys by deploy/exclude-from-deploy.txt,"
          echo "but their presence is a reminder that they must be rotated/removed per the audit"
          echo "(docs/legacy-critical-audit/fix-roadmap.md) rather than relied on being 'just excluded' forever."
          echo
          found=0
          for path in MODERNIS_BACKUP kmsaadmin/db.php test.php en/test.php reverse.php en/reverse.php; do
            if [ -e "$path" ]; then
              echo "::warning::Dangerous path present in repo: $path"
              found=1
            fi
          done
          if git ls-files '*.sql' | grep -q . ; then
            echo "::warning::SQL dump files present in repo:"
            git ls-files '*.sql'
            found=1
          fi
          if [ "$found" -eq 0 ]; then
            echo "No known-dangerous paths found."
          fi
          # Informational only — never fails the build.
          exit 0

  # BLOCKING: precise, value-shaped patterns only, scoped to runtime files
  # (not docs/, not deploy/, not the known-legacy MODERNIS_BACKUP/ copy).
  # This does not match on variable/constant *names* like DB_PASSWORD or
  # RECAPTCHA_SECRET_KEY (those are legitimate now — see includes/env.php,
  # config.php, form_action.php) — it only matches the *shape* of an actual
  # hard-coded secret value:
  #   - a define('DB_PASSWORD'/'DB_PASS', '<literal>') call
  #   - a Google reCAPTCHA-shaped key literal (6L + 38 chars)
  #   - PEM private key material
  # As of the .env migration, runtime PHP files no longer contain hard-coded
  # secrets, so this job is blocking. If it ever fires, a real secret literal
  # has been committed — fix it by moving the value to .env (see
  # docs/deployment/legacy-env.md) before merging.
  secret-scan-runtime:
    name: Secret scan — runtime files (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for hard-coded secret VALUES (not variable names)
        run: |
          set -euo pipefail
          found=0

          scan() {
            local label="$1"
            local pattern="$2"
            matches=$(grep -rIlP \
              --exclude-dir=.git \
              --exclude-dir=.github \
              --exclude-dir=docs \
              --exclude-dir=deploy \
              --exclude-dir=MODERNIS_BACKUP \
              --exclude=*.md \
              --exclude=.env.example \
              -- "$pattern" . || true)
            if [ -n "$matches" ]; then
              echo "::error::${label} — matched in the following files (values not printed):"
              echo "$matches" | sed 's/^/  - /'
              found=1
            fi
          }

          scan "Hard-coded DB_PASSWORD/DB_PASS define()" "define\s*\(\s*['\"]DB_(PASSWORD|PASS)['\"]\s*,\s*['\"][^'\"]+['\"]"
          scan "reCAPTCHA-shaped key literal (6L...)" "6L[0-9A-Za-z_-]{38}"
          scan "Private key material" "BEGIN (RSA|EC|OPENSSH|PGP) PRIVATE KEY"

          if [ "$found" -eq 1 ]; then
            echo
            echo "A real hard-coded secret value was found in a committed runtime file."
            echo "Move it to .env and read it via env_required()/env_value() from"
            echo "includes/env.php instead. See docs/deployment/legacy-env.md."
            exit 1
          fi
          echo "No hard-coded secret values found in runtime files."

  # NON-BLOCKING: broad keyword-based awareness scan. Deliberately looser
  # than secret-scan-runtime above (matches on words like "password"/"secret"
  # wherever they appear, including in variable names, MODERNIS_BACKUP/, and
  # any leftover mentions the precise job above wouldn't catch) — that
  # looseness means it WILL flag legitimate things (e.g. the word "password"
  # in an HTML form label) and known-but-not-yet-cleaned files
  # (MODERNIS_BACKUP/ still has its own committed secrets — see
  # docs/legacy-critical-audit/security-findings.md finding #5). It exists as
  # a reminder, not a gate: docs/*.md and .env.example are excluded so this
  # never fires on documentation merely discussing secrets.
  secret-scan-hygiene:
    name: Secret scan — broad hygiene reminder (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Grep for suspicious keywords (filenames only)
        run: |
          set -euo pipefail
          patterns=(
            '[Pp]assword'
            '[Ss]ecret'
            'recaptcha'
            'api_key'
            'API_KEY'
            'MapTiler'
            'maptiler'
            'BEGIN (RSA|EC|OPENSSH|PGP) PRIVATE KEY'
          )
          found=0
          for p in "${patterns[@]}"; do
            matches=$(grep -rIl -E "$p" \
              --exclude-dir=.git \
              --exclude-dir=.github \
              --exclude-dir=docs \
              --exclude=*.md \
              --exclude=.env.example \
              . || true)
            if [ -n "$matches" ]; then
              echo "::warning::Pattern '$p' matched in the following files (values not printed):"
              echo "$matches" | sed 's/^/  - /'
              found=1
            fi
          done
          if [ "$found" -eq 1 ]; then
            echo
            echo "This is a broad, non-blocking reminder scan — matches include variable"
            echo "names and known-legacy files (e.g. MODERNIS_BACKUP/), not just real secrets."
            echo "For an actual hard-coded secret VALUE in a runtime file, see the"
            echo "secret-scan-runtime job instead. MODERNIS_BACKUP/ still contains real"
            echo "committed secrets pending removal — see"
            echo "docs/legacy-critical-audit/security-findings.md finding #5."
          else
            echo "No suspicious keywords matched."
          fi
          # Non-blocking by design (continue-on-error: true above).
          if [ "$found" -eq 1 ]; then
             echo "::warning::Broad secret hygiene scan found matches. This is non-blocking for the legacy baseline."
          fi
          exit 0

  admin-action-guard-check:
    name: Admin action auth-guard check (non-blocking for now)
    runs-on: ubuntu-latest
    # Non-blocking: per docs/legacy-critical-audit/security-findings.md, the
    # files below currently have NO auth check at all (finding #1, critical).
    # Making this job blocking today would fail CI on every commit until that
    # is fixed. Once kmsaadmin/actions/*.php are gated behind userLogged()
    # (fix-roadmap.md, immediate fix #1), flip continue-on-error to false so
    # this becomes a real regression guard.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Check kmsaadmin/actions/*.php for an auth/session guard
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(kmsaadmin/actions/*.php)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No files found in kmsaadmin/actions/ — nothing to check."
            exit 0
          fi
          missing=0
          for f in "${files[@]}"; do
            base=$(basename "$f")
            # login-user.php is the login handler itself; it establishes the
            # session rather than requiring one, so it is intentionally
            # excluded from this guard check.
            if [ "$base" = "login-user.php" ]; then
              continue
            fi
            if grep -qE 'userLogged\s*\(|isLoggedIn\s*\(|\$_SESSION\[[^]]*\]\[.?loggedin.?\]' "$f"; then
              echo "OK: $f references an auth/session guard."
            else
              echo "::warning file=$f::No auth/session guard (e.g. userLogged()) found in this admin action endpoint. Per docs/legacy-critical-audit/security-findings.md this is a CRITICAL unauthenticated write/upload vulnerability."
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo
            echo "See docs/legacy-critical-audit/fix-roadmap.md, immediate fix #1:"
            echo "gate every file in kmsaadmin/actions/ behind userLogged()."
          fi
          # This job is allowed to fail (continue-on-error: true above), so a
          # real failure here still shows up clearly in the checks list
          # without blocking PR merges while the emergency fix is pending.
          if [ "$missing" -eq 1 ]; then
            echo "::warning::Admin action guard check found missing guards. This is non-blocking until the emergency fix is implemented."
          fi
          exit 0
