name: Deploy to production

# Production has no SSH access, so deployment uses FTP (see
# docs/deployment/github-secrets.md and docs/deployment/production-server.md
# for background and limitations). deploy/legacy-rsync-deploy.sh is kept in
# the repo only as future reference for if/when SSH access becomes
# available — it is not used by this workflow.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  # Re-run CI's blocking checks against main before deploying. This does not
  # replace PR-time CI (branch protection already required it to merge) — it
  # is a last-line guard in case main was ever updated without going through
  # a checked PR (e.g. an admin merge override).
  verify:
    name: Verify PHP syntax before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none

      - name: Lint all PHP files
        run: |
          set -euo pipefail
          status=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /tmp/lint-output 2>&1; then
              echo "::error file=$file::PHP syntax error"
              cat /tmp/lint-output
              status=1
            fi
          done < <(find . -path ./.git -prune -o -type f -name '*.php' -print0)
          exit $status

      - name: Verify deployment exclusion file exists
        run: |
          set -euo pipefail
          test -f deploy/exclude-from-deploy.txt

  deploy:
    name: Deploy main to production (FTP)
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Print commit being deployed
        run: |
          echo "Deploying commit: $(git rev-parse HEAD)"
          echo "Commit subject: $(git log -1 --pretty=%s)"

      # SamKirkland/FTP-Deploy-Action mirrors local-dir to server-dir: it
      # uploads new/changed files and, by default, DELETES server files that
      # no longer exist locally. Two separate exclude groups below guard
      # against that:
      #
      #  1. "Dangerous / non-production files" — duplicated from
      #     deploy/exclude-from-deploy.txt. This action has no
      #     --exclude-from equivalent (it only accepts an inline glob list
      #     in the workflow), so the pattern list is hand-duplicated here.
      #     IMPORTANT: if you edit deploy/exclude-from-deploy.txt, update
      #     this list too — they must be kept in sync manually.
      #
      #  2. "Runtime upload directories" — ehl-pastatai/, ehl-upload/,
      #     news-img/ hold images uploaded through the admin panel directly
      #     on the server. They are NOT excluded because they're dangerous —
      #     they're excluded so this mirroring deploy never uploads to or
      #     deletes from them, which would otherwise wipe out any image
      #     uploaded on the server since the last deploy but never committed
      #     to Git. This satisfies "do not delete server uploads/images
      #     unless explicitly approved." If these directories don't already
      #     exist on the server (e.g. a brand-new server), they must be
      #     populated there once, out of band, before relying on this
      #     exclusion.
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          protocol: ftps
          log-level: standard
          dangerous-clean-slate: false
          exclude: |
            # --- dangerous / non-production files (mirrors deploy/exclude-from-deploy.txt) ---
            .git/**
            .github/**
            .agents/**
            .codex/**
            .idea/**
            .gitignore
            docs/**
            README.md
            LEGACY_NOTICE.md
            deploy/**
            MODERNIS_BACKUP/**
            **/*.sql
            kmsaadmin/db.php
            test.php
            en/test.php
            reverse.php
            en/reverse.php
            **/*.bak
            **/*.orig
            **/*.swp
            **/*~
            **/.DS_Store
            # --- runtime upload directories: never uploaded to or deleted from by this job ---
            ehl-pastatai/**
            ehl-upload/**
            news-img/**

      - name: Verify PRODUCTION_URL responds (optional)
        if: ${{ secrets.PRODUCTION_URL != '' }}
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          set -euo pipefail
          status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$PRODUCTION_URL" || echo "000")
          echo "GET $PRODUCTION_URL -> HTTP $status"
          if [ "$status" -ge 500 ] || [ "$status" = "000" ]; then
            echo "::warning::Production URL did not respond healthily after deploy (HTTP $status). Deploy already completed; this is a post-deploy check only, not a rollback trigger."
          fi

      - name: Deployment summary
        run: |
          echo "Deployed commit $(git rev-parse HEAD) to production via FTP." >> "$GITHUB_STEP_SUMMARY"
